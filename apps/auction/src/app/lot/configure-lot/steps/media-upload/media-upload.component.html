<label tuiInputFiles>
  <input
    accept="image/*"
    tuiInputFiles
    [formControl]="control"
    [multiple]="true"
  />
</label>

<tui-files class="tui-space_top-1">
  @for (file of accepted$ | async; track file) {
    <tui-file [file]="file" (remove)="onRemove(file)" />
  }
