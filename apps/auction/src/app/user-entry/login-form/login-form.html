<section class="login__form-section">
  <div class="login__form-wrap">
    <header class="login__form-header">
      <span class="login__eyebrow">Heritage &amp; Trust</span>
      <h1 class="login__title">Account Access</h1>
    </header>

    <!-- Email / password form -->
    <form class="login__form" (ngSubmit)="loginUser()" [formGroup]="loginForm">
      <!-- <div class="login__field">
        <label class="login__label" for="login-email">Email Address</label>
        <input
          class="login__input"
          id="login-email"
          type="email"
          placeholder="name@example.com"
          autocomplete="email"
          libValidationMessage
          formControlName="email"
        />
      </div> -->

      <tui-textfield iconStart="@tui.mail">
        <label tuiLabel for="email">Email Address</label>
        <input
          id="email"
          placeholder="Enter Email Address"
          tuiInput
          formControlName="email"
        />
      </tui-textfield>

      <!-- <div class="login__field">
        <div class="login__label-row">
          <label class="login__label" for="login-password">Password</label>
          <a class="login__forgot" routerLink="/forgot-password"
            >Forgot Password?</a
          >
        </div>
        <input
          class="login__input"
          id="login-password"
          type="password"
          placeholder="••••••••"
          autocomplete="current-password"
          formControlName="password"
          libValidationMessage
        />
      </div> -->
      <div class="d-grid gap-1">
        <a class="login__forgot j-self-end" routerLink="/forgot-password"
          >Forgot Password?</a
        >
        <tui-textfield iconStart="@tui.key-round">
          <label tuiLabel for="password">Password</label>
          <input
            placeholder="Enter Password"
            tuiInput
            type="password"
            formControlName="password"
          />
          <tui-icon tuiPassword />
        </tui-textfield>
      </div>

      <button
        tuiButton
        type="submit"
        appearance="primary"
        size="l"
        class="login__submit"
      >
        Login
      </button>
    </form>

    <!-- Divider -->
    <div class="login__divider">
      <span class="login__divider-text">Identity Verification</span>
    </div>

    <!-- Social auth -->
    <div class="login__social">
      <button class="login__social-btn" type="button">
        <svg class="login__social-icon" viewBox="0 0 24 24">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4"
          />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853"
          />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
            fill="#FBBC05"
          />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335"
          />
        </svg>
        Google
      </button>
      <button class="login__social-btn" type="button">
        <svg class="login__social-icon" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M17.05 20.28c-.96 0-2.04-.6-3.23-.6-1.16 0-2.3.58-3.22.58-1.63 0-4.08-2.8-4.08-6.16 0-3.32 2.13-5.08 4.14-5.08 1.06 0 1.95.64 2.87.64.91 0 1.76-.64 2.92-.64 1.7 0 2.99.91 3.73 2-.37.22-.85.55-1.15.86-1.14 1.18-1.07 3.05.15 4.3.4.4.88.75 1.25.96-.4 1.14-1.6 3.14-3.38 3.14zm-3.03-15.54c.94-1.15.88-2.58.83-3.05-.38.01-1.8.17-2.77 1.34-.84 1-1 2.37-.9 2.89.44.04 1.94-.09 2.84-1.18z"
          />
        </svg>
        Apple
      </button>
    </div>

    <p class="login__footer-note">
      New to the gallery?
      <a class="login__footer-link" routerLink="/signup"
        >Consign your first item</a
      >
    </p>
  </div>
</section>
