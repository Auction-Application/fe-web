<section class="signup__form-section">
  <div class="signup__form-wrap">
    <header class="signup__form-header">
      <h2 class="signup__title">Create your account</h2>
      <p class="signup__subtitle">
        Already have an account?
        <a class="link" routerLink="/login">Sign in</a>
      </p>
    </header>

    <!-- Social auth -->
    <div class="signup__social">
      <button class="signup__social-btn" type="button">
        <svg class="signup__social-icon" viewBox="0 0 24 24">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4"
          />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853"
          />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
            fill="#FBBC05"
          />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335"
          />
        </svg>
        Sign up with Google
      </button>
      <button class="signup__social-btn" type="button">
        <svg
          class="signup__social-icon"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path
            d="M17.05 20.28c-.96 0-2.04-.6-3.23-.6-1.16 0-2.3.58-3.22.58-1.63 0-4.08-2.8-4.08-6.16 0-3.32 2.13-5.08 4.14-5.08 1.06 0 1.95.64 2.87.64.91 0 1.76-.64 2.92-.64 1.7 0 2.99.91 3.73 2-.37.22-.85.55-1.15.86-1.14 1.18-1.07 3.05.15 4.3.4.4.88.75 1.25.96-.4 1.14-1.6 3.14-3.38 3.14zm-3.03-15.54c.94-1.15.88-2.58.83-3.05-.38.01-1.8.17-2.77 1.34-.84 1-1 2.37-.9 2.89.44.04 1.94-.09 2.84-1.18z"
          />
        </svg>
        Sign up with Apple
      </button>
    </div>

    <div class="signup__divider">
      <span class="signup__divider-text">or use email</span>
    </div>

    <form
      class="signup__form"
      (ngSubmit)="signupUser()"
      [formGroup]="signupForm"
    >
      <div>
        <tui-textfield iconStart="@tui.user">
          <label tuiLabel for="username">User Name</label>
          <input
            id="username"
            placeholder="Enter Username"
            tuiInput
            formControlName="username"
            libValidationMessage
            [container]="usernameInputView.container"
          />
        </tui-textfield>
        <ng-container
          libViewContainer
          #usernameInputView="libViewContainer"
        ></ng-container>
      </div>

      <div>
        <tui-textfield iconStart="@tui.mail">
          <label tuiLabel for="email">Email Address</label>
          <input
            id="email"
            placeholder="Enter Email Address"
            tuiInput
            formControlName="email"
            libValidationMessage
            [container]="emailAdressInputView.container"
          />
        </tui-textfield>
        <ng-container
          libViewContainer
          #emailAdressInputView="libViewContainer"
        ></ng-container>
      </div>

      <div>
        <tui-textfield iconStart="@tui.key-round">
          <label tuiLabel for="password">Password</label>
          <input
            placeholder="Enter Password"
            tuiInput
            type="password"
            formControlName="password"
            libValidationMessage
            [container]="passwordInputView.container"
          />
          <tui-icon tuiPassword />
        </tui-textfield>
        <ng-container
          libViewContainer
          #passwordInputView="libViewContainer"
        ></ng-container>
      </div>

      <div class="signup__terms">
        <input class="signup__checkbox" id="terms" type="checkbox" />
        <label class="signup__terms-label" for="terms">
          I agree to the
          <a class="signup__terms-link" routerLink="/terms">Terms of Service</a>
          and
          <a class="signup__terms-link" routerLink="/privacy">Privacy Policy</a
          >.
        </label>
      </div>

      <button tuiButton type="submit" appearance="primary" size="l">
        Create Account
      </button>
    </form>
  </div>
</section>
